version: '3.8'

services:
  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=satchi
      - POSTGRES_USER=satchi
      - POSTGRES_PASSWORD=satchipass

  backend:
    build:
      context: .
      dockerfile: ./satchi_api/Dockerfile
    command: gunicorn backend.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./satchi_api:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=change_me_in_prod
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - DATABASE_URL=postgres://satchi:satchipass@db:5432/satchi
    depends_on:
      - db

  frontend:
    build:
      context: ./satchi-main
      dockerfile: Dockerfile
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
